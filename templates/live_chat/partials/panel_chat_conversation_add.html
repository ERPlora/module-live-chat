{% load djicons i18n %}

<div class="side-sheet-header">
    <h3 class="sheet-title">{% trans "Add Chatconversation" %}</h3>
    <button class="sheet-close" @click="closePanel()">{% icon "close-outline" %}</button>
</div>

<div class="side-sheet-content">
    <form id="add-chat_conversation-form"
          hx-post="{% url 'live_chat:chat_conversation_add' %}"
          hx-target="#datatable-body"
          hx-swap="innerHTML"
          @htmx:after-request="closePanel()"
          class="flex flex-col gap-4 p-6">
        {% csrf_token %}

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Visitor Name" %}</label>
            <input type="text" name="visitor_name" class="input input-sm w-full" placeholder="{% trans 'Visitor Name' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Visitor Email" %}</label>
            <input type="email" name="visitor_email" class="input input-sm w-full" placeholder="{% trans 'Email' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
            <select name="status" class="select select-sm w-full">
                <option value="">{% trans "Select..." %}</option>
            </select>
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Assigned To" %}</label>
            <input type="text" name="assigned_to" class="input input-sm w-full" placeholder="{% trans 'Assigned To' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Ended At" %}</label>
            <input type="datetime-local" name="ended_at" class="input input-sm w-full">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Rating" %}</label>
            <input type="number" name="rating" class="input input-sm w-full"  placeholder="0">
        </div>
    </form>
</div>

<div class="side-sheet-footer">
    <div class="flex justify-end gap-2">
        <button type="button" class="btn btn-ghost btn-sm" @click="closePanel()">{% trans "Cancel" %}</button>
        <button type="submit" form="add-chat_conversation-form" class="btn btn-sm color-primary">
            {% icon "add-outline" %} {% trans "Add" %}
        </button>
    </div>
</div>
