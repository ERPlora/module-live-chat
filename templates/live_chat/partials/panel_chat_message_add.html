{% load djicons i18n %}

<div class="side-sheet-header">
    <h3 class="sheet-title">{% trans "Add Chatmessage" %}</h3>
    <button class="sheet-close" @click="closePanel()">{% icon "close-outline" %}</button>
</div>

<div class="side-sheet-content">
    <form id="add-chat_message-form"
          hx-post="{% url 'live_chat:chat_message_add' %}"
          hx-target="#datatable-body"
          hx-swap="innerHTML"
          @htmx:after-request="closePanel()"
          class="flex flex-col gap-4 p-6">
        {% csrf_token %}

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Sender Type" %}</label>
            <input type="text" name="sender_type" class="input input-sm w-full" placeholder="{% trans 'Sender Type' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Sender Name" %}</label>
            <input type="text" name="sender_name" class="input input-sm w-full" placeholder="{% trans 'Sender Name' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Message" %}</label>
            <textarea name="message" class="textarea textarea-sm w-full" rows="3"></textarea>
        </div>
    </form>
</div>

<div class="side-sheet-footer">
    <div class="flex justify-end gap-2">
        <button type="button" class="btn btn-ghost btn-sm" @click="closePanel()">{% trans "Cancel" %}</button>
        <button type="submit" form="add-chat_message-form" class="btn btn-sm color-primary">
            {% icon "add-outline" %} {% trans "Add" %}
        </button>
    </div>
</div>
